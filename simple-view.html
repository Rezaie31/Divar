<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>پنل مدیریت آگهی‌ها</title>
    <link rel="icon" type="image/png" href="support.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            color: #f3f4f6;
            direction: rtl;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1::before {
            content: "🛡️";
            font-size: 32px;
            background: none;
            color: #f97316;
        }

        .sub {
            color: #94a3b8;
            border-right: 3px solid #f97316;
            padding-right: 14px;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 18px;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        .btn {
            background: linear-gradient(95deg, #f97316, #ea580c);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #f97316;
            box-shadow: none;
        }

        .refresh-btn {
            background: #1e293b;
            border: 1px solid #475569;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 24px;
            overflow: auto;
            display: block;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
        }

        th {
            background: #f97316;
            color: #0f172a;
            padding: 12px 8px;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #2d3a5e;
            vertical-align: middle;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .gallery-img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.2);
            cursor: pointer;
            transition: 0.2s;
        }

        .gallery-img:hover {
            transform: scale(1.05);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin: 2px;
        }

        .btn-small.download {
            background: #3b82f6;
        }

        .btn-small.confirm {
            background: #22c55e;
        }

        .btn-small.delete {
            background: #ef4444;
        }

        .empty-msg {
            text-align: center;
            padding: 40px;
            background: #1e293b70;
            border-radius: 32px;
            color: #cbd5e1;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #4b5563;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>📋 پنل مدیریت آگهی‌ها</h1>
    <div class="sub">مشاهده، تأیید، حذف و دانلود تصاویر آگهی‌ها</div>

    <div id="loginBox">
        <div class="input-group">
            <input type="password" id="adminPass" placeholder="رمز مدیریت">
            <button class="btn" onclick="checkAdminPass()">🔐 ورود به پنل</button>
        </div>
    </div>

    <div id="panel" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px;">
            <button class="btn refresh-btn" onclick="loadAds()">🔄 دریافت جدیدترین آگهی‌ها</button>
            <button class="btn btn-outline" id="exportBtn">📥 خروجی JSON</button>
        </div>
        <div id="adsList" style="overflow-x: auto;"></div>
    </div>
</div>
<footer>© دیوار اصفهان | پشتیبانی امن و متمرکز</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgUZ3vfU6rJYSBMXun4oICctw-J8jsGgs1o95Ci9vhpVUMXe7uSIQ7sgZ5aLIYXMYpeA/exec";
    let currentAdsData = null;

    function downloadImage(base64String, index) {
        const link = document.createElement('a');
        link.href = base64String;
        link.download = `image_${Date.now()}_${index}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function confirmAd(rowIndex) {
        if (!currentAdsData || rowIndex >= currentAdsData.length) return;
        currentAdsData[rowIndex][6] = "تأیید شده";
        renderTable(currentAdsData);
        alert(`✅ آگهی شماره ${rowIndex} تأیید شد.`);
    }

    function deleteAd(rowIndex) {
        if (!currentAdsData || rowIndex >= currentAdsData.length) return;
        if (confirm(`آیا از حذف این آگهی مطمئن هستید؟`)) {
            currentAdsData.splice(rowIndex, 1);
            renderTable(currentAdsData);
            alert("آگهی حذف شد.");
        }
    }

    function renderGallery(images) {
        if (!images || images.length === 0) return "—";
        let html = '<div class="gallery">';
        images.forEach((img, idx) => {
            html += `<img src="${img}" class="gallery-img" onclick="window.open('${img}')" title="تصویر ${idx+1}">`;
            html += `<button class="btn-small download" onclick="downloadImage('${img}', ${idx})">📥</button>`;
        });
        html += '</div>';
        return html;
    }

    function renderTable(rows) {
        const container = document.getElementById("adsList");
        if (!rows || rows.length < 2) {
            container.innerHTML = "<div class='empty-msg'>📭 هیچ آگهی ثبت نشده است.</div>";
            return;
        }

        let html = '<table><thead><tr>';
        rows[0].forEach(h => html += `<th>${h}</th>`);
        html += '<th>عملیات</th></thead><tbody>';

        for (let i = 1; i < rows.length; i++) {
            html += '<tr>';
            for (let j = 0; j < rows[i].length; j++) {
                let cell = rows[i][j];
                if (j === 7 && cell && (cell.startsWith('data:image') || cell.includes('data:image'))) {
                    // رسید
                    cell = `<div style="text-align:center;"><img src="${cell}" width="60" style="border-radius:8px;"><br><button class="btn-small download" onclick="downloadImage('${cell}', 0)">📥 دانلود رسید</button></div>`;
                } else if (j === 8 && cell) {
                    // گالری عکس‌ها
                    try {
                        const images = JSON.parse(cell);
                        cell = renderGallery(images);
                    } catch(e) {
                        cell = "—";
                    }
                }
                html += `<td>${cell || '—'}</td>`;
            }
            const status = rows[i][6] || "در انتظار بررسی";
            const isConfirmed = status === "تأیید شده";
            html += `<td>
                <button class="btn-small confirm" onclick="confirmAd(${i})" ${isConfirmed ? 'disabled' : ''}>
                    ${isConfirmed ? '✅ تأیید شده' : '✔️ ثبت شد'}
                </button>
                <button class="btn-small delete" onclick="deleteAd(${i})">🗑️ حذف</button>
              </div>
            </div>
           </div>
          </div>
        </div>
       </div>
      </div>
     </div>
    </div>
   </div>
  </div>
 </div>
</div>

                                `;
            html += '</tr>';
        }
        html += '</tbody>閱補';
        container.innerHTML = html;
    }

    async function loadAds() {
        const container = document.getElementById("adsList");
        container.innerHTML = "<div class='empty-msg'>⏳ در حال بارگذاری آگهی‌ها...</div>";
        try {
            const res = await fetch(SCRIPT_URL);
            const text = await res.text();
            const json = JSON.parse(text);
            const rows = json.data;
            if (!rows || rows.length < 2) {
                container.innerHTML = "<div class='empty-msg'>📭 هیچ آگهی ثبت نشده است.</div>";
                currentAdsData = null;
                return;
            }
            currentAdsData = rows;
            renderTable(currentAdsData);
        } catch (e) {
            console.error(e);
            container.innerHTML = "<div class='empty-msg'>⚠️ خطا در دریافت اطلاعات. لطفاً چند ثانیه دیگر دوباره تلاش کنید.</div>";
            currentAdsData = null;
        }
    }

    window.checkAdminPass = () => {
        const pwd = document.getElementById("adminPass").value;
        if (pwd === "0101") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            loadAds();
        } else {
            alert("❌ رمز اشتباه است.");
        }
    };

    document.getElementById("exportBtn")?.addEventListener("click", () => {
        if (!currentAdsData) {
            alert("هیچ آگهی برای خروجی گرفتن وجود ندارد.");
            return;
        }
        const dataStr = JSON.stringify(currentAdsData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ads_export_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert("✅ خروجی گرفته شد.");
    });
</script>
</body>
</html>
