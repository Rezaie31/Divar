<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ثبت آگهی | پنل پشتیبان</title>
    <style>
        body { font-family: Tahoma; background: #0f172a; color: white; direction: rtl; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: none; }
        button { background: #ef4444; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .success { background: #22c55e; padding: 10px; border-radius: 8px; display: none; margin-top: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #475569; padding: 8px; text-align: center; }
        img { max-width: 80px; }
        .btn-secondary { background: #3b82f6; }
    </style>
</head>
<body>
<div class="card">
    <h1>ثبت آگهی در دیوار اصفهان</h1>
    <p>هزینه: ۵۰,۰۰۰ تومان</p>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h2>فرم ثبت آگهی</h2>
        <form id="adForm">
            <input type="text" id="name" placeholder="نام" required>
            <input type="text" id="family" placeholder="نام خانوادگی" required>
            <input type="tel" id="phone" placeholder="شماره همراه" required>
            <select id="adType">
                <option>فروش کالا</option><option>خدمات</option><option>استخدام</option><option>ملک</option>
            </select>
            <textarea id="details" rows="4" placeholder="توضیحات آگهی"></textarea>
            <input type="file" id="receipt" accept="image/*" required>
            <button type="submit">ثبت آگهی</button>
            <div id="successMsg" class="success">آگهی شما ثبت شد.</div>
        </form>
    </div>

    <div class="card">
        <h2>پنل پشتیبان</h2>
        <div id="loginBox">
            <input type="password" id="adminPass" placeholder="رمز پنل">
            <button onclick="login()">ورود</button>
            <p>رمز پیش‌فرض: 0101</p>
        </div>
        <div id="panelArea" style="display: none;">
            <button class="btn-secondary" onclick="exportToJSON()">📥 خروجی گرفتن از آگهی‌ها</button>
            <button class="btn-secondary" onclick="loadAds()">🔄 نمایش آگهی‌ها</button>
            <div id="adsList" style="margin-top: 15px;"></div>
        </div>
    </div>
</div>

<script>
    let ads = JSON.parse(localStorage.getItem("divar_ads") || "[]");

    function saveAds() { localStorage.setItem("divar_ads", JSON.stringify(ads)); }

    document.getElementById("adForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const file = document.getElementById("receipt").files[0];
        if (!file) return alert("عکس رسید رو انتخاب کن");
        const reader = new FileReader();
        reader.onload = function(ev) {
            ads.unshift({
                id: Date.now(),
                name: document.getElementById("name").value,
                family: document.getElementById("family").value,
                phone: document.getElementById("phone").value,
                adType: document.getElementById("adType").value,
                details: document.getElementById("details").value,
                receipt: ev.target.result,
                status: "در انتظار بررسی",
                date: new Date().toLocaleString("fa-IR")
            });
            saveAds();
            document.getElementById("successMsg").style.display = "block";
            setTimeout(() => document.getElementById("successMsg").style.display = "none", 3000);
            document.getElementById("adForm").reset();
        };
        reader.readAsDataURL(file);
    });

    window.login = () => {
        if (document.getElementById("adminPass").value === "0101") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panelArea").style.display = "block";
            loadAds();
        } else alert("رمز اشتباه است");
    };

    window.loadAds = () => {
        const list = document.getElementById("adsList");
        if (!ads.length) { list.innerHTML = "<p>هیچ آگهی ثبت نشده</p>"; return; }
        let html = '</table><thead><tr><th>نام</th><th>تلفن</th><th>نوع</th><th>توضیحات</th><th>رسید</th><th>وضعیت</th></tr></thead><tbody>';
        ads.forEach(a => {
            html += `<tr><td>${a.name} ${a.family}</td><td>${a.phone}</td><td>${a.adType}</td><td>${a.details}</td>
                     <td><img src="${a.receipt}" width="80"></td><td>${a.status}</td></tr>`;
        });
        html += `</tbody>對</table>`;
        list.innerHTML = html;
    };

    window.exportToJSON = () => {
        const dataStr = JSON.stringify(ads, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ads_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert("فایل دانلود شد. میتونی توی هر دستگاهی ذخیره‌اش کنی.");
    };
</script>
</body>
</html>
