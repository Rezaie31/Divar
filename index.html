<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت آگهی | دیوار اصفهان</title>
    <style>
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #111827);
            color: white;
            direction: rtl;
            padding: 20px;
        }
        .container{width:90%; max-width:1100px; margin:0 auto;}
        .card{
            background: rgba(30,41,59,0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        input, select, textarea{
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 16px;
            color: white;
            margin: 8px 0;
        }
        .btn{
            background: linear-gradient(95deg, #f97316, #ea580c);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-secondary{
            background: #1e293b;
            border: 1px solid #475569;
        }
        .success{
            background: #22c55e;
            padding: 12px;
            border-radius: 16px;
            display: none;
            margin-top: 10px;
            text-align: center;
        }
        .note{
            background: rgba(34,197,94,0.1);
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-top: 15px;
        }
        @media (max-width:700px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📢 سامانه ثبت آگهی | دیوار اصفهان</h1>
        <p>هزینه ثبت آگهی: <strong>۵۰,۰۰۰ تومان</strong></p>
    </div>

    <div class="grid">
        <div class="card">
            <h2>فرم ثبت آگهی</h2>
            <form id="adForm">
                <input type="text" id="name" placeholder="نام" required>
                <input type="text" id="family" placeholder="نام خانوادگی" required>
                <input type="tel" id="phone" placeholder="شماره همراه" required>
                <select id="adType">
                    <option>فروش کالا</option><option>خدمات</option><option>استخدام</option><option>ملک</option>
                </select>
                <textarea id="details" rows="4" placeholder="توضیحات آگهی"></textarea>
                <input type="file" id="receipt" accept="image/*" required>
                <button class="btn" type="submit">ثبت آگهی</button>
                <div id="successMsg" class="success">✅ آگهی با موفقیت ثبت شد.</div>
                <div class="note">پس از ثبت، آگهی برای بررسی به پشتیبان ارسال می‌شود.</div>
            </form>
        </div>

        <div class="card">
            <h2>پنل پشتیبان</h2>
            <div id="loginBox">
                <input type="password" id="adminPass" placeholder="رمز پنل">
                <button class="btn btn-secondary" onclick="checkLogin()">ورود به پنل</button>
            </div>
            <div id="panelArea" style="display:none;">
                <button class="btn btn-secondary" onclick="window.open('آدرس_شیت_خودت')">📥 مشاهده آگهی‌ها در گوگل شیت</button>
                <div class="note">برای مدیریت آگهی‌ها، روی دکمه بالا کلیک کن.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // آدرس Web App جدید خودت رو اینجا بذار
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0XxsJjUiC2KdaRh-LzSSPr6i0NukSxZzlvq5-Ts61j0jJfzVNvygazgSXPNXcAWBeA/exec"; // 👈 عوض کن
    
    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    document.getElementById("adForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const file = document.getElementById("receipt").files[0];
        if (!file) { alert("لطفاً تصویر رسید را آپلود کنید."); return; }
        
        const receiptBase64 = await fileToBase64(file);
        const adData = {
            name: document.getElementById("name").value,
            family: document.getElementById("family").value,
            phone: document.getElementById("phone").value,
            adType: document.getElementById("adType").value,
            details: document.getElementById("details").value,
            receipt: receiptBase64,
            status: "در انتظار بررسی"
        };
        
        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(adData)
            });
            document.getElementById("successMsg").style.display = "block";
            setTimeout(() => document.getElementById("successMsg").style.display = "none", 4000);
            document.getElementById("adForm").reset();
        } catch(error) {
            console.error("Error:", error);
            alert("خطا در ثبت آگهی. لطفاً دوباره تلاش کنید.");
        }
    });

    window.checkLogin = () => {
        const pwd = document.getElementById("adminPass").value;
        if (pwd === "0101") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panelArea").style.display = "block";
        } else {
            alert("رمز اشتباه است");
        }
    };
</script>
</body>
</html>
