<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>پنل مدیریت آگهی‌ها</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #0f172a;
            color: white;
            direction: rtl;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #475569;
            padding: 10px;
            text-align: center;
        }
        img {
            max-width: 100px;
            border-radius: 10px;
        }
        .btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 پنل مدیریت آگهی‌ها</h1>
    <div id="loginBox">
        <input type="password" id="adminPass" placeholder="رمز پنل">
        <button class="btn" onclick="checkAdminPass()">ورود</button>
    </div>
    <div id="panel" style="display:none;">
        <button class="btn" onclick="loadAds()">🔄 نمایش آگهی‌ها</button>
        <div id="adsList"></div>
    </div>
</div>

<script>
    // آدرس Web App جدید (از آخرین Deploy)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0XxsJjUiC2KdaRh-LzSSPr6i0NukSxZzlvq5-Ts61j0jJfzVNvygazgSXPNXcAWBeA/exec";

    async function loadAds() {
        const res = await fetch(SCRIPT_URL);
        const text = await res.text();
        try {
            const json = JSON.parse(text);
            const rows = json.data;
            if (!rows || rows.length < 2) {
                document.getElementById("adsList").innerHTML = "<p>هیچ آگهی ثبت نشده.</p>";
                return;
            }
            let html = '<table><thead><td>' + rows[0].map(h => `<th>${h}</th>`).join('') + '</thead><tbody>';
            for (let i = 1; i < rows.length; i++) {
                html += '<tr>';
                for (let j = 0; j < rows[i].length; j++) {
                    let cell = rows[i][j];
                    if (j === 7 && cell && cell.startsWith('data:image')) {
                        cell = `<img src="${cell}" width="100">`;
                    }
                    html += `<td>${cell || ''}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody>樹脂';
            document.getElementById("adsList").innerHTML = html;
        } catch(e) {
            document.getElementById("adsList").innerHTML = "<p>خطا در دریافت اطلاعات. لطفاً چند دقیقه صبر کنید و دوباره تلاش کنید.</p>";
            console.error(e);
        }
    }

    window.checkAdminPass = () => {
        const pwd = document.getElementById("adminPass").value;
        if (pwd === "0101") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            loadAds();
        } else {
            alert("رمز اشتباه است");
        }
    };
</script>
</body>
</html>
